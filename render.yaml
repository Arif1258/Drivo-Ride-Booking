services:
  - type: web
    name: drivo-backend
    env: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: DB_CONNECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAPBOX_API
        sync: false
      - key: FRONTEND_URL
        sync: false
